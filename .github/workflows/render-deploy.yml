name: Render Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for Render auto deploy first
        id: auto_deploy
        continue-on-error: true
        env:
          DEPLOY_URL: https://soulmatch-1.onrender.com/api/health
          EXPECT_COMMIT: ${{ github.sha }}
          DEPLOY_WAIT_SECONDS: 600
        run: bash tools/wait-for-deploy.sh

      - name: Trigger Render deploy hook fallback
        if: steps.auto_deploy.outcome != 'success'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing GitHub secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Wait for live Render commit after fallback
        if: steps.auto_deploy.outcome != 'success'
        env:
          DEPLOY_URL: https://soulmatch-1.onrender.com/api/health
          EXPECT_COMMIT: ${{ github.sha }}
        run: bash tools/wait-for-deploy.sh