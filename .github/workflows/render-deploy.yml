name: Render Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'server/**'
      - 'docs/**'
      - 'package.json'
      - 'client/package.json'
      - 'client/pnpm-lock.yaml'
      - 'server/package.json'
      - 'server/pnpm-lock.yaml'
      - 'Dockerfile'
      - 'tools/wait-for-deploy.sh'
      - '.github/workflows/render-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for Render auto deploy first
        id: auto_deploy
        continue-on-error: true
        env:
          DEPLOY_URL: https://soulmatch-1.onrender.com/api/health
          EXPECT_COMMIT: ${{ github.sha }}
          DEPLOY_WAIT_SECONDS: 120
          DEPLOY_POLL_INTERVAL: 15
        run: bash tools/wait-for-deploy.sh

      - name: Trigger Render deploy hook fallback
        if: steps.auto_deploy.outcome != 'success'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing GitHub secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL" | tee deploy-hook.json

      - name: Check Render build state after fallback
        if: steps.auto_deploy.outcome != 'success'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          DEPLOY_ID=$(jq -r '.deploy.id // .id // empty' deploy-hook.json 2>/dev/null || true)
          if [ -z "$DEPLOY_ID" ]; then
            echo "No deploy id returned by hook; skipping direct Render API wait"
            exit 0
          fi

          echo "Checking direct Render deploy state for $DEPLOY_ID"
          if node tools/render-inspect.mjs wait "$DEPLOY_ID" 180 10; then
            exit 0
          fi

          echo "Render deploy did not reach a healthy build state in the direct API wait window."
          echo "Final deploy details:"
          node tools/render-inspect.mjs deploy "$DEPLOY_ID" || true
          echo "Recent build logs:"
          node tools/render-inspect.mjs logs 50 || true
          exit 1

      - name: Wait for live Render commit after fallback
        if: steps.auto_deploy.outcome != 'success'
        env:
          DEPLOY_URL: https://soulmatch-1.onrender.com/api/health
          EXPECT_COMMIT: ${{ github.sha }}
          DEPLOY_WAIT_SECONDS: 420
          DEPLOY_POLL_INTERVAL: 15
        run: bash tools/wait-for-deploy.sh
