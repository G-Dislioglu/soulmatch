services:
  - type: web
    name: soulmatch
    runtime: node
    plan: free
    buildCommand: >
      npm install -g pnpm@9 &&
      cd client && pnpm install --frozen-lockfile && pnpm build &&
      cd ../server && pnpm install --frozen-lockfile && pnpm build
    startCommand: node server/dist/index.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: DEV_TOKEN
        sync: false
      - key: FAL_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.11.0
