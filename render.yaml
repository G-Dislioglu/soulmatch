services:
  - type: web
    name: soulmatch
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: >
      npm install -g pnpm@10 &&
      pnpm install --frozen-lockfile &&
      pnpm build
    startCommand: node server/dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: DEV_TOKEN
        sync: false
      - key: FAL_KEY
        sync: false
      - key: BUILD_AT
        value: render
      - key: NODE_VERSION
        value: 20.11.0
