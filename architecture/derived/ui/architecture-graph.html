:root{--bg:#0a0a12;--s1:#111119;--s2:#16161f;--s3:#1c1c28;--brd:rgba(255,255,255,0.06);

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--brd);background:var(--s1);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar h1{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;font-weight:400;background:linear-gradient(135deg,#C9A84C,#e8d5a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-sub{font-size:10px;color:var(--t3)}
/* Tabs */
.tabs{display:flex;gap:0;flex-shrink:0;border-bottom:1px solid var(--brd);background:var(--s1)}
.tab{padding:8px 18px;font-size:11px;letter-spacing:1px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab:hover{color:var(--t2);background:var(--s2)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
/* Main content */
.content{flex:1;overflow:auto;padding:0}
.view{display:none;height:100%}
.view.active{display:flex}
/* === MAP VIEW === */
.map-view{display:grid;grid-template-columns:repeat(4,1fr);gap:0;height:100%}
.map-trunk{border-right:1px solid var(--brd);padding:16px;cursor:pointer;transition:background .2s;overflow-y:auto}
.map-trunk:last-child{border-right:none}
.map-trunk:hover{background:var(--s1)}
.map-trunk-hdr{text-align:center;margin-bottom:14px}
.map-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:18px;font-weight:600;margin:0 auto 6px;border:2px solid;transition:box-shadow .3s}
.map-trunk:hover .map-icon{box-shadow:0 0 20px rgba(255,255,255,0.08)}
.map-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px}
.map-sub{font-size:9px;color:var(--t3);margin-top:2px}
.map-stats{display:flex;justify-content:center;gap:8px;margin-top:6px;font-size:9px;color:var(--t3)}
.map-stat{display:flex;align-items:center;gap:3px}
.map-dot{width:5px;height:5px;border-radius:50%}
.map-nodes{margin-top:10px;border-top:1px solid var(--brd);padding-top:8px}
.map-node{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;font-size:10px;transition:background .15s;margin:1px 0}
.map-node:hover{background:var(--s2)}
.map-ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.map-nname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-canon{font-size:7px;padding:1px 4px;border-radius:3px;flex-shrink:0;letter-spacing:.5px;font-weight:500}
.c-canonical{background:rgba(93,202,165,0.12);color:var(--canon)}
.c-legacy{background:rgba(239,159,39,0.12);color:var(--legacy)}
.c-deprecated{background:rgba(226,75,74,0.12);color:var(--deprecated)}
.c-forbidden{background:rgba(255,68,102,0.15);color:var(--forbidden)}
.c-supported{background:rgba(255,255,255,0.05);color:var(--t3)}
.map-conn{font-size:8px;color:var(--t3);padding:2px 6px;display:flex;align-items:center;gap:4px;margin:2px 0}
.map-conn::before{content:'⟷';font-size:10px;opacity:.4}
/* === FOCUS VIEW === */
.focus-view{flex-direction:row;height:100%}
.focus-sidebar{width:240px;border-right:1px solid var(--brd);overflow-y:auto;background:var(--s1);flex-shrink:0}
.focus-trunk-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--brd);transition:background .15s;font-size:12px}
.focus-trunk-btn:hover,.focus-trunk-btn.active{background:var(--s2)}
.focus-trunk-dot{width:10px;height:10px;border-radius:50%}
.focus-main{flex:1;overflow-y:auto;padding:20px}
.focus-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
.focus-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:16px;font-weight:600;border:2px solid}
.focus-title{font-family:'Cinzel',serif;font-size:16px;letter-spacing:2px}
.focus-sub{font-size:11px;color:var(--t2)}
/* Section */
.sec{margin-bottom:16px}
.sec-hdr{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--brd);cursor:pointer;user-select:none;font-size:10px;letter-spacing:1.5px;color:var(--t3);transition:color .15s}
.sec-hdr:hover{color:var(--t2)}
.sec-arrow{font-size:7px;transition:transform .15s}
.sec.collapsed .sec-arrow{transform:rotate(-90deg)}
.sec.collapsed .sec-body{display:none}
.sec-body{padding-left:14px;border-left:1.5px solid var(--brd);margin-top:6px}
/* Nodes */
.nd{display:flex;align-items:flex-start;gap:7px;padding:4px 0;position:relative;cursor:pointer;border-radius:4px;transition:background .1s}
.nd:hover{background:rgba(255,255,255,0.02)}
.nd::before{content:'';position:absolute;left:-15px;top:11px;width:12px;border-top:1.5px solid var(--brd)}
.nd-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.nd-body{flex:1;min-width:0}
.nd-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.nd-name{font-size:11px;font-weight:500}
.nd-detail{font-size:9px;color:var(--t2);margin-top:1px}
.nd-file{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);margin-top:1px}
.nd-commit{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--t3);background:var(--s2);padding:0 3px;border-radius:2px}
.nd-tag{font-size:8px;padding:0 4px;border-radius:3px;border:1px solid var(--brd);color:var(--t3)}
.md-tag{font-size:8px;padding:1px 4px;border-radius:3px;font-family:'JetBrains Mono',monospace;background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.15)}
.hotspot-tag{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(239,159,39,0.1);color:var(--active);border:1px solid rgba(239,159,39,0.15)}
.entry-tag{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(93,202,165,0.1);color:var(--done);border:1px solid rgba(93,202,165,0.15)}
.nd-ai{font-size:9px;color:var(--t3);font-style:italic;margin-top:2px;padding:2px 6px;background:rgba(124,106,247,0.05);border-radius:3px;border-left:2px solid rgba(124,106,247,0.2)}
.children{padding-left:14px;border-left:1px dashed rgba(255,255,255,0.04);margin-top:2px}
.child{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:10px;color:var(--t2);position:relative}
.child::before{content:'';position:absolute;left:-15px;top:8px;width:12px;border-top:1px dashed rgba(255,255,255,0.04)}
.child-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}

.radar-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.radar-card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:14px}
.radar-title{font-size:11px;letter-spacing:1.5px;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.radar-emoji{font-size:14px}
.radar-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;margin:3px 0;font-size:11px;transition:background .15s;cursor:default}
.radar-item:hover{background:var(--s2)}
.radar-bar{height:4px;border-radius:2px;flex-shrink:0}
.radar-label{flex:1}
.radar-val{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}

.compare-view{flex-direction:row;height:100%}
.compare-col{flex:1;border-right:1px solid var(--brd);padding:16px;overflow-y:auto}
.compare-col:last-child{border-right:none}
.compare-hdr{text-align:center;padding-bottom:10px;border-bottom:1px solid var(--brd);margin-bottom:10px}
.compare-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:99px;margin-top:4px}
.compare-row{display:flex;align-items:center;gap:6px;padding:4px 6px;font-size:11px;border-radius:4px;margin:2px 0}
.compare-match{background:rgba(93,202,165,0.06);border-left:2px solid var(--done)}
.compare-diff{background:rgba(239,159,39,0.06);border-left:2px solid var(--active)}
.compare-missing{background:rgba(226,75,74,0.06);border-left:2px solid var(--blocked)}

.ai-view{flex-direction:column;height:100%}
.ai-toolbar{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--brd);background:var(--s1)}
.ai-btn{font-size:10px;padding:4px 12px;border-radius:5px;border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.ai-btn:hover{background:var(--s2);color:var(--t1)}
.ai-btn.active{background:var(--s2);color:var(--gold);border-color:rgba(201,168,76,0.3)}
.ai-output{flex:1;overflow:auto;padding:16px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:var(--t2);white-space:pre-wrap;tab-size:2}
.ai-output .kw{color:var(--gold)}.ai-output .str{color:var(--done)}.ai-output .cmt{color:var(--t3);font-style:italic}
/* Status dots */
.s-done{background:var(--done)}.s-active{background:var(--active);animation:pulse 2s ease-in-out infinite}
.s-planned{background:var(--planned)}.s-possible{background:transparent;border:1.5px dashed var(--t3)}
.s-blocked{background:var(--blocked)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.view.active{animation:fadeIn .2s}
</style>

/* ===== HELPERS ===== */
function sClass(s){return s==='active'?'s-active':''}
function sStyle(s){
if(s==='done')return'background:var(--done)';if(s==='active')return'background:var(--active)';
if(s==='planned')return'background:var(--planned)';if(s==='blocked')return'background:var(--blocked)';
return'background:transparent;border:1.5px dashed var(--t3)';
}
function canonBadge(c){if(!c)return'';return`<span class="map-canon c-${c}">${c}</span>`}
function countStatus(app){const c={done:0,active:0,planned:0,possible:0};
app.sections.forEach(s=>s.nodes.forEach(n=>{if(c[n.status]!==undefined)c[n.status]++;
(n.children||[]).forEach(ch=>{if(c[ch.status]!==undefined)c[ch.status]++})}));return c}

/* ===== MAP VIEW ===== */
function renderMap(){
document.getElementById('v-map').innerHTML=Object.entries(G).map(([k,app])=>{
const c=countStatus(app);
const nodes=[];app.sections.forEach(s=>s.nodes.slice(0,6).forEach(n=>{
nodes.push(`<div class="map-node"><span class="map-ndot ${sClass(n.status)}" style="${sStyle(n.status)}"></span>
<span class="map-nname">${n.name}</span>${canonBadge(n.canon)}
${n.hotspot?'<span class="hotspot-tag">hotspot</span>':''}${n.entry?'<span class="entry-tag">entry</span>':''}</div>`)}));
const conns=(app.sections.find(s=>s.title==='CONNECTIONS')||{nodes:[]}).nodes.map(n=>
`<div class="map-conn">${n.name}</div>`).join('');
return`<div class="map-trunk" onclick="switchToFocus('${k}')">
<div class="map-trunk-hdr">
<div class="map-icon" style="color:${app.hex};border-color:${app.hex};background:${app.hex}12">${app.letter}</div>
<div class="map-name" style="color:${app.hex}">${app.name}</div>
<div class="map-sub">${app.sub}</div>
<div class="map-stats">
<span class="map-stat"><span class="map-dot" style="background:var(--done)"></span>${c.done}</span>
<span class="map-stat"><span class="map-dot ${sClass('active')}" style="background:var(--active)"></span>${c.active}</span>
<span class="map-stat"><span class="map-dot" style="background:var(--planned)"></span>${c.planned}</span>
</div></div>
<div class="map-nodes">${nodes.join('')}</div>
${conns?`<div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--brd)">${conns}</div>`:''}
</div>`}).join('');
}

/* ===== FOCUS VIEW ===== */
let focusTrunk='soulmatch';
function renderFocus(){
const sidebar=Object.entries(G).map(([k,app])=>
`<div class="focus-trunk-btn ${k===focusTrunk?'active':''}" onclick="focusTrunk='${k}';renderFocus()">
<span class="focus-trunk-dot" style="background:${app.hex}"></span>${app.name}</div>`).join('');
const app=G[focusTrunk];
const sections=app.sections.map(s=>{
const nodes=s.nodes.map(n=>{
const ch=(n.children||[]).map(c=>
`<div class="child"><span class="child-dot ${sClass(c.status)}" style="${sStyle(c.status)}"></span>${c.name}
${c.detail?`<span style="color:var(--t3);margin-left:4px;font-size:9px">${c.detail}</span>`:''}</div>`).join('');
return`<div class="nd">
<span class="nd-dot ${sClass(n.status)}" style="${sStyle(n.status)}"></span>
<div class="nd-body">
<div class="nd-row">
<span class="nd-name">${n.name}</span>
${n.md?'<span class="md-tag">.md</span>':''}
${n.hotspot?'<span class="hotspot-tag">hotspot</span>':''}
${n.entry?'<span class="entry-tag">entry</span>':''}

${n.detail?`<div class="nd-detail">${n.detail}</div>`:''}
${n.file?`<div class="nd-file">${n.file}</div>`:''}
${n.ai?`<div class="nd-ai">AI: ${n.ai}</div>`:''}
${ch?`<div class="children">${ch}</div>`:''}
</div></div>`}).join('');
return`<div class="sec"><div class="sec-hdr" onclick="this.parentElement.classList.toggle('collapsed')">
<span class="sec-arrow">▼</span>${s.title}</div><div class="sec-body">${nodes}</div></div>`}).join('');
document.getElementById('v-focus').innerHTML=`
<div class="focus-sidebar">${sidebar}</div>
<div class="focus-main">
<div class="focus-header">
<div class="focus-icon" style="color:${app.hex};border-color:${app.hex};background:${app.hex}12">${app.letter}</div>

function switchToFocus(k){focusTrunk=k;switchView('focus')}

/* ===== RADAR VIEW ===== */
function renderRadar(){
const cold=RADAR.cold.sort((a,b)=>b.days-a.days).map(r=>
`<div class="radar-item"><div class="radar-bar" style="width:${r.days}px;background:var(--bp)"></div>
<span class="radar-label">${r.name} <span style="color:var(--t3);font-size:9px">(${r.trunk})</span></span>
<span class="radar-val">${r.days}d</span></div>`).join('');
const dup=RADAR.duplication.map(r=>
`<div class="radar-item" style="flex-direction:column;align-items:flex-start;gap:3px">
<div style="display:flex;gap:6px;align-items:center;width:100%">
<span style="font-size:10px;flex:1">${r.a}</span>
<span style="font-size:8px;color:var(--t3)">⟷</span>
<span style="font-size:10px;flex:1">${r.b}</span>
<span class="map-canon c-${r.risk==='high'?'deprecated':'legacy'}">${r.risk}</span>
</div>
<div style="font-size:9px;color:var(--done);padding-left:4px">${r.hint}</div>
</div>`).join('');
const risk=RADAR.risk.sort((a,b)=>b.score-a.score).map(r=>
`<div class="radar-item"><div class="radar-bar" style="width:${r.score}px;background:${r.score>70?'var(--blocked)':'var(--active)'}"></div>
<span class="radar-label">${r.name}<div style="font-size:9px;color:var(--t3)">${r.reason}</div></span>
<span class="radar-val">${r.score}</span></div>`).join('');
const drift=RADAR.drift.map(r=>
`<div class="radar-item" style="flex-direction:column;align-items:flex-start;gap:2px">
<div style="display:flex;gap:6px;align-items:center;width:100%">
<span style="font-size:10px;flex:1">${r.name}</span>
<span class="map-canon c-${r.severity==='deprecated'?'deprecated':r.severity==='legacy'?'legacy':'supported'}">${r.severity}</span>
</div>
<div style="font-size:9px;color:var(--t3)">Spec: ${r.spec} → Realität: ${r.reality}</div>
</div>`).join('');
document.getElementById('v-radar').innerHTML=`<div class="radar-grid">
<div class="radar-card"><div class="radar-title">❄ COLD RADAR — Lange nicht angefasst</div>${cold}</div>
<div class="radar-card"><div class="radar-title">⚠ RISK RADAR — Hohe Komplexität/Bugs</div>${risk}</div>
<div class="radar-card"><div class="radar-title">♊ DUPLICATION RADAR — Ähnliche Patterns</div>${dup}</div>
<div class="radar-card"><div class="radar-title">↕ DRIFT RADAR — Spec ≠ Code</div>${drift}</div>
</div>`;
}

/* ===== COMPARE VIEW ===== */

<span style="font-size:11px">${f.name}</span>
${f.note?`<span style="font-size:9px;color:var(--t3);margin-left:auto">${f.note}</span>`:''}
</div>`).join('');
return`<div class="compare-col"><div class="compare-hdr">
<div style="font-size:13px;font-weight:500">${data.title}</div>
<div style="font-size:10px;color:var(--t3)">${data.trunk} · ${data.file}</div>
<div class="compare-badge" style="background:${side==='right'?'rgba(93,202,165,0.1);color:var(--done)':'rgba(239,159,39,0.1);color:var(--active)'}">
${side==='right'?'CANONICAL SOURCE':'ADAPTION'}</div></div>${rows}</div>`}

`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px;gap:8px;border-right:1px solid var(--brd);border-left:1px solid var(--brd);min-width:60px">
<div style="font-size:9px;color:var(--t3);letter-spacing:1px;writing-mode:vertical-lr">REUSE MAP</div></div>`+
col(COMPARE.right,'right');
}

/* ===== VIEW SWITCHING ===== */
function switchView(name){
document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===name));
document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='v-'+name));
if(name==='map')renderMap();else if(name==='focus')renderFocus();
else if(name==='radar')renderRadar();else if(name==='compare')renderCompare();
else if(name==='ai')renderAI();
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchView(t.dataset.view)));
